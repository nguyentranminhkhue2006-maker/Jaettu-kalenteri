{% extends "layout.html" %}

{% block title %}Edit event{% endblock %}

{% block content %}
<h2>Edit event</h2>
<div class="info">
{% for message in get_flashed_messages() %}
<p><b>{{ message }}</b></p>
{% endfor %}
</div>
<form action="/update_event" method="post">
    <p>
        Event: <a href="/event/{{event.id}}">{{event.event_name}}</a>
    </p>
    <p>
        <label for="date_time">Date and time:</label> <br />
        <input type="datetime-local" name="date_time" id="date_time" min="{{cur_date}}" value="{{event.date_time}}"required/>
    </p>
    <p>
        <label for="description">Description:</label> <br />
        <textarea name="description" id="description" rows="8" cols="30" maxlength="1000" required>{{event.description}}</textarea>
    </p>
    {% for class in all_classes %}
    <p>
        <label for="class{{class}}">{{class}}:</label> <br />
        <select name="classes" id="class{{class}}">
            <option value="">(choose)</option>
        {% for option in all_classes[class] %}
        {% if classes[class] == option %}
            <option value="{{class}}:{{option}}" selected>{{option}}</option>
        {% else %}
            <option value="{{class}}:{{option}}">{{option}}</option>
        {% endif %}
        {% endfor %}
        </select>
    </p>
    {% endfor %}
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="hidden" name="event_id" value="{{event.id}}" />
    <input type="submit" value="Update event" />
</form>
{% endblock %}
