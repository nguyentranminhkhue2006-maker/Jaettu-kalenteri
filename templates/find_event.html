{% extends "layout.html" %}

{% block title %}Find event{% endblock %}

{% block content %}

<h2>Find event</h2>
<form action="/find_event" method="get">
  <p>
      <label for="query">Keyword:</label> <input type="text" name="query" id="query" value="{{query}}">
  </p>
  {% for class in all_classes %}
  <p>
    <label for="class{{class}}">{{class}}:</label>
    <select name="classes" id="class{{class}}">
      <option value="">(choose)</option>
      {% for value in all_classes[class] %}
      {% if classes and classes[class]==value %}
        <option value="{{class}}:{{value}}" selected>{{value}}</option>
      {% else %}
        <option value="{{class}}:{{value}}">{{value}}</option>
      {% endif %}
      {% endfor %}
    </select>
  </p>
  {% endfor %}
  <input type="submit" value="search">
</form>

{% if results %}
<h3>Results</h3>

<ul>
  {% for event in results %}
  <li>
      <a href="/event/{{event.id}}">{{event.event_name}}</a>
  </li>
  {% endfor %}
</ul>
{% endif %}
{% endblock %}
